<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>下载神器 · 管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0c1210;
      --bg1: #152019;
      --ink: #e8f2ea;
      --muted: #8aa093;
      --line: rgba(232, 242, 234, 0.12);
      --accent: #3dff9a;
      --danger: #ff6b6b;
      --card: rgba(21, 32, 25, 0.72);
      --glow: rgba(61, 255, 154, 0.18);
      --header-h: 58px;
      --safe-top: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 12% -10%, rgba(61, 255, 154, 0.16), transparent 55%),
        radial-gradient(700px 420px at 100% 0%, rgba(64, 180, 255, 0.1), transparent 50%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #0a100e);
    }

    .shell {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: calc(var(--header-h) + var(--safe-top));
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: var(--safe-top) 1rem 0;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 18, 16, 0.72);
      backdrop-filter: blur(12px);
    }

    .brand {
      font-family: Syne, sans-serif;
      font-weight: 800;
      font-size: 1.15rem;
      letter-spacing: -0.03em;
      margin: 0;
      white-space: nowrap;
    }
    .brand span { color: var(--accent); }

    .tabs {
      display: flex;
      gap: 0.35rem;
      flex: 1;
      justify-content: center;
    }

    .tab {
      font-family: Syne, sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tab:hover { color: var(--ink); }
    .tab.active {
      color: var(--accent);
      border-color: rgba(61, 255, 154, 0.35);
      background: rgba(61, 255, 154, 0.1);
    }

    .header-actions { display: flex; gap: 0.5rem; }

    .btn-ghost {
      font-family: Syne, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      padding: 0.45rem 0.85rem;
      font-size: 0.85rem;
      transition: border-color 0.15s;
    }
    .btn-ghost:hover { border-color: rgba(232, 242, 234, 0.35); }

    .panels {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .panel-view {
      display: none;
      height: 100%;
      overflow: auto;
    }
    .panel-view.active { display: block; }

    #panel-download.active { display: flex; }
    #downloadFrame {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .keys-wrap {
      width: min(760px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 1.5rem 0 2.5rem;
    }

    .keys-lead {
      margin: 0 0 1.1rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 1.25rem;
      box-shadow: 0 0 0 1px rgba(61, 255, 154, 0.04), 0 24px 60px rgba(0, 0, 0, 0.35);
      margin-bottom: 1rem;
    }

    h2 {
      font-family: Syne, sans-serif;
      font-size: 1.05rem;
      margin: 0 0 1rem;
      letter-spacing: 0.02em;
    }

    label {
      display: block;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.9rem;
    }

    .preset {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.22);
      color: var(--ink);
      font: inherit;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .preset:hover { border-color: rgba(232, 242, 234, 0.35); }
    .preset.active {
      border-color: rgba(61, 255, 154, 0.55);
      background: rgba(61, 255, 154, 0.12);
      color: var(--accent);
    }

    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    @media (max-width: 560px) {
      .fields { grid-template-columns: 1fr; }
      .tabs { justify-content: flex-start; }
      .brand { display: none; }
    }

    input[type="datetime-local"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      color: var(--ink);
      font: inherit;
      padding: 0.75rem 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: rgba(61, 255, 154, 0.55);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .row {
      display: flex;
      gap: 0.65rem;
      margin-top: 0.9rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      font-family: Syne, sans-serif;
      font-weight: 700;
      border: 0;
      cursor: pointer;
      padding: 0.75rem 1.1rem;
      font-size: 0.92rem;
      background: var(--accent);
      color: #04140b;
    }
    .btn-primary:hover:not(:disabled) { background: #6dffb2; }

    .status {
      margin-top: 0.75rem;
      min-height: 1.3rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }

    .result-box {
      display: none;
      margin-top: 0.9rem;
      border: 1px solid rgba(61, 255, 154, 0.28);
      background: rgba(61, 255, 154, 0.08);
      padding: 0.9rem;
    }
    .result-box.show { display: block; }

    .result-key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.82rem;
      word-break: break-all;
      line-height: 1.5;
      margin: 0 0 0.55rem;
    }

    .meta {
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .item {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.22);
      padding: 0.75rem 0.85rem;
    }
    .item.expired { opacity: 0.55; }
    .item-key {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.78rem;
      word-break: break-all;
      margin: 0 0 0.4rem;
    }
    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem 0.85rem;
      align-items: center;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .chip {
      display: inline-block;
      border: 1px solid var(--line);
      padding: 0.1rem 0.4rem;
      font-size: 0.75rem;
    }
    .chip.ok { color: var(--accent); border-color: rgba(61, 255, 154, 0.3); }
    .chip.err { color: #ffb4b4; border-color: rgba(255, 107, 107, 0.35); }
    .empty { color: var(--muted); font-size: 0.9rem; margin: 0; }
  </style>
</head>
<body>
  <script src="./qishui-cardkey.js"></script>
  <script>
    (function () {
      if (!window.QishuiCardKey || !window.QishuiCardKey.hasAdminSession()) {
        location.replace("./qishui-auth.html");
      }
    })();
  </script>

  <div class="shell">
    <header class="header">
      <h1 class="brand">下载<span>神器</span></h1>
      <nav class="tabs" role="tablist" aria-label="功能切换">
        <button class="tab active" type="button" role="tab" aria-selected="true" data-tab="download" id="tab-download">下载</button>
        <button class="tab" type="button" role="tab" aria-selected="false" data-tab="keys" id="tab-keys">临时卡密</button>
      </nav>
      <div class="header-actions">
        <button class="btn-ghost" type="button" id="logoutBtn">退出</button>
      </div>
    </header>

    <div class="panels">
      <section class="panel-view active" id="panel-download" role="tabpanel" aria-labelledby="tab-download">
        <iframe id="downloadFrame" title="下载页" src="./qishui-downloader.html?embed=1"></iframe>
      </section>

      <section class="panel-view" id="panel-keys" role="tabpanel" aria-labelledby="tab-keys" hidden>
        <div class="keys-wrap">
          <p class="keys-lead">生成带期限的临时卡密。可离线校验，过期后自动失效。</p>

          <section class="card">
            <h2>生成临时卡密</h2>
            <div class="presets" id="presets">
              <button class="preset active" type="button" data-days="1">1 天</button>
              <button class="preset" type="button" data-days="7">7 天</button>
              <button class="preset" type="button" data-days="30">30 天</button>
              <button class="preset" type="button" data-days="90">90 天</button>
              <button class="preset" type="button" data-custom="1">自定义</button>
            </div>

            <div class="fields">
              <div>
                <label for="expireAt">到期时间</label>
                <input id="expireAt" type="datetime-local" />
              </div>
              <div>
                <label for="note">备注（可选）</label>
                <input id="note" type="text" maxlength="40" placeholder="例如：给某某用" />
              </div>
            </div>

            <div class="row">
              <button class="btn-primary" type="button" id="generateBtn">生成卡密</button>
              <button class="btn-ghost" type="button" id="copyBtn" disabled>复制卡密</button>
            </div>
            <div class="status" id="status" aria-live="polite"></div>

            <div class="result-box" id="resultBox">
              <p class="result-key" id="resultKey"></p>
              <p class="meta" id="resultMeta"></p>
            </div>
          </section>

          <section class="card">
            <div class="row" style="margin-top:0; justify-content:space-between;">
              <h2 style="margin:0">本机生成记录</h2>
              <button class="btn-ghost" type="button" id="clearHistoryBtn">清空记录</button>
            </div>
            <div class="list" id="historyList" style="margin-top:1rem"></div>
          </section>
        </div>
      </section>
    </div>
  </div>

  <script>
    (function () {
      const CK = window.QishuiCardKey;
      if (!CK.hasAdminSession()) {
        location.replace("./qishui-auth.html");
        return;
      }

      const tabButtons = Array.from(document.querySelectorAll(".tab"));
      const panelDownload = document.getElementById("panel-download");
      const panelKeys = document.getElementById("panel-keys");

      function switchTab(name) {
        const isDownload = name === "download";
        for (const btn of tabButtons) {
          const on = btn.dataset.tab === name;
          btn.classList.toggle("active", on);
          btn.setAttribute("aria-selected", on ? "true" : "false");
        }
        panelDownload.classList.toggle("active", isDownload);
        panelKeys.classList.toggle("active", !isDownload);
        panelDownload.hidden = !isDownload;
        panelKeys.hidden = isDownload;
        location.hash = name;
      }

      for (const btn of tabButtons) {
        btn.addEventListener("click", () => switchTab(btn.dataset.tab));
      }

      const initial = location.hash.replace("#", "") === "keys" ? "keys" : "download";
      switchTab(initial);

      document.getElementById("logoutBtn").addEventListener("click", () => {
        CK.clearSessions();
        location.replace("./qishui-auth.html");
      });

      const expireAtEl = document.getElementById("expireAt");
      const noteEl = document.getElementById("note");
      const generateBtn = document.getElementById("generateBtn");
      const copyBtn = document.getElementById("copyBtn");
      const statusEl = document.getElementById("status");
      const resultBox = document.getElementById("resultBox");
      const resultKey = document.getElementById("resultKey");
      const resultMeta = document.getElementById("resultMeta");
      const historyList = document.getElementById("historyList");
      const presets = document.getElementById("presets");
      let latestKey = "";

      function setStatus(text, type) {
        statusEl.textContent = text || "";
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function toLocalInputValue(date) {
        const p = (n) => String(n).padStart(2, "0");
        return `${date.getFullYear()}-${p(date.getMonth() + 1)}-${p(date.getDate())}T${p(date.getHours())}:${p(date.getMinutes())}`;
      }

      function setExpireByDays(days) {
        const d = new Date(Date.now() + days * 24 * 60 * 60 * 1000);
        expireAtEl.value = toLocalInputValue(d);
      }

      setExpireByDays(1);

      presets.addEventListener("click", (e) => {
        const btn = e.target.closest(".preset");
        if (!btn) return;
        for (const el of presets.querySelectorAll(".preset")) el.classList.remove("active");
        btn.classList.add("active");
        if (btn.dataset.days) setExpireByDays(Number(btn.dataset.days));
        else expireAtEl.focus();
      });

      function renderHistory() {
        const list = CK.loadHistory();
        historyList.innerHTML = "";
        if (!list.length) {
          const p = document.createElement("p");
          p.className = "empty";
          p.textContent = "暂无生成记录。";
          historyList.appendChild(p);
          return;
        }

        const now = Date.now();
        for (const item of list) {
          const expired = now >= item.expiresAt;
          const row = document.createElement("article");
          row.className = "item" + (expired ? " expired" : "");

          const key = document.createElement("p");
          key.className = "item-key";
          key.textContent = item.key;

          const meta = document.createElement("div");
          meta.className = "item-meta";

          const chip = document.createElement("span");
          chip.className = "chip " + (expired ? "err" : "ok");
          chip.textContent = expired ? "已过期" : "有效";

          const exp = document.createElement("span");
          exp.textContent = "到期 " + CK.formatTime(item.expiresAt);

          const created = document.createElement("span");
          created.textContent = "生成 " + CK.formatTime(item.createdAt);

          meta.append(chip, exp, created);
          if (item.note) {
            const note = document.createElement("span");
            note.textContent = item.note;
            meta.appendChild(note);
          }

          const copy = document.createElement("button");
          copy.type = "button";
          copy.className = "btn-ghost";
          copy.style.padding = "0.35rem 0.65rem";
          copy.style.fontSize = "0.8rem";
          copy.textContent = "复制";
          copy.addEventListener("click", async () => {
            try {
              await navigator.clipboard.writeText(item.key);
              setStatus("已复制历史卡密", "ok");
            } catch (_) {
              setStatus("复制失败，请手动选择复制", "error");
            }
          });
          meta.appendChild(copy);

          row.append(key, meta);
          historyList.appendChild(row);
        }
      }

      generateBtn.addEventListener("click", async () => {
        const value = expireAtEl.value;
        if (!value) {
          setStatus("请选择到期时间", "error");
          return;
        }
        const expiresAt = new Date(value).getTime();
        if (!Number.isFinite(expiresAt) || expiresAt <= Date.now()) {
          setStatus("到期时间必须晚于当前时间", "error");
          return;
        }

        generateBtn.disabled = true;
        setStatus("正在生成…");
        try {
          const key = await CK.generateTempKey(expiresAt);
          latestKey = key;
          resultKey.textContent = key;
          resultMeta.textContent = "有效期至 " + CK.formatTime(expiresAt);
          resultBox.classList.add("show");
          copyBtn.disabled = false;
          CK.pushHistory({
            key,
            expiresAt,
            createdAt: Date.now(),
            note: noteEl.value.trim() || "",
          });
          renderHistory();
          setStatus("已生成临时卡密", "ok");
        } catch (err) {
          setStatus(err.message || "生成失败", "error");
        } finally {
          generateBtn.disabled = false;
        }
      });

      copyBtn.addEventListener("click", async () => {
        if (!latestKey) return;
        try {
          await navigator.clipboard.writeText(latestKey);
          setStatus("卡密已复制到剪贴板", "ok");
        } catch (_) {
          setStatus("复制失败，请手动选择复制", "error");
        }
      });

      document.getElementById("clearHistoryBtn").addEventListener("click", () => {
        CK.saveHistory([]);
        renderHistory();
        setStatus("已清空本机生成记录");
      });

      renderHistory();
    })();
  </script>
</body>
</html>
