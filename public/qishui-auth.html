<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>音乐下载 · 授权验证</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0c1210;
      --bg1: #152019;
      --ink: #e8f2ea;
      --muted: #8aa093;
      --line: rgba(232, 242, 234, 0.12);
      --accent: #3dff9a;
      --danger: #ff6b6b;
      --card: rgba(21, 32, 25, 0.72);
      --glow: rgba(61, 255, 154, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(900px 480px at 12% -10%, rgba(61, 255, 154, 0.16), transparent 55%),
        radial-gradient(700px 420px at 100% 0%, rgba(64, 180, 255, 0.1), transparent 50%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #0a100e);
      background-attachment: fixed;
      padding: 1.5rem;
    }

    .gate {
      width: min(420px, 100%);
      animation: rise 0.45s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-family: Syne, sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 2.5rem);
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 0.55rem;
      text-align: center;
    }
    .brand span { color: var(--accent); }

    .lead {
      margin: 0 0 1.5rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 1.35rem;
      box-shadow: 0 0 0 1px rgba(61, 255, 154, 0.04), 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      color: var(--ink);
      font: inherit;
      padding: 0.9rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.06em;
    }
    input:focus {
      border-color: rgba(61, 255, 154, 0.55);
      box-shadow: 0 0 0 3px var(--glow);
    }
    input::placeholder { color: #5f7467; letter-spacing: normal; }

    .row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.95rem;
      align-items: center;
    }

    button {
      font-family: Syne, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 0;
      cursor: pointer;
      padding: 0.85rem 1.2rem;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s;
      font-size: 0.95rem;
      flex: 1;
      background: var(--accent);
      color: #04140b;
    }
    button:hover { background: #6dffb2; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .status {
      margin-top: 0.85rem;
      min-height: 1.35rem;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }

    .hint {
      margin-top: 1.1rem;
      text-align: center;
      color: #6f8377;
      font-size: 0.8rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="gate">
    <h1 class="brand">音乐<span>下载</span></h1>
    <p class="lead">请输入卡密完成授权后进入下载页</p>

    <section class="panel">
      <form id="authForm" autocomplete="off">
        <label for="cardKey">卡密</label>
        <input
          id="cardKey"
          name="cardKey"
          type="password"
          inputmode="text"
          placeholder="请输入卡密"
          maxlength="64"
          required
          autofocus
        />
        <div class="row">
          <button type="submit" id="submitBtn">验证并进入</button>
        </div>
        <div class="status" id="status" aria-live="polite"></div>
      </form>
    </section>
    <p class="hint">授权仅保存在本机当前会话，关闭浏览器后需重新验证。</p>
  </main>

  <script>
    (function () {
      // 可在此配置有效卡密（客户端校验，仅作门禁用途）
      const VALID_KEYS = [
        "ZHUANGSHILGM",
      ];

      const AUTH_STORAGE_KEY = "qishui_auth_token";
      const AUTH_TOKEN = "ok";
      const TARGET = "./qishui-downloader.html";

      const form = document.getElementById("authForm");
      const input = document.getElementById("cardKey");
      const statusEl = document.getElementById("status");
      const submitBtn = document.getElementById("submitBtn");

      if (sessionStorage.getItem(AUTH_STORAGE_KEY) === AUTH_TOKEN) {
        location.replace(TARGET);
        return;
      }

      function setStatus(text, type) {
        statusEl.textContent = text || "";
        statusEl.className = "status" + (type ? " " + type : "");
      }

      function normalizeKey(value) {
        return String(value || "").trim().toUpperCase();
      }

      function isValidKey(value) {
        const key = normalizeKey(value);
        return VALID_KEYS.some((item) => normalizeKey(item) === key);
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        const value = input.value;
        if (!value.trim()) {
          setStatus("请输入卡密", "error");
          input.focus();
          return;
        }

        submitBtn.disabled = true;
        setStatus("正在验证…");

        // 轻微延迟，避免瞬间闪烁
        setTimeout(function () {
          if (!isValidKey(value)) {
            submitBtn.disabled = false;
            setStatus("卡密无效，请核对后重试", "error");
            input.select();
            return;
          }

          sessionStorage.setItem(AUTH_STORAGE_KEY, AUTH_TOKEN);
          setStatus("验证成功，正在跳转…", "ok");
          location.replace(TARGET);
        }, 280);
      });
    })();
  </script>
</body>
</html>
