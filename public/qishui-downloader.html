<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>音乐下载</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg0: #0c1210;
      --bg1: #152019;
      --ink: #e8f2ea;
      --muted: #8aa093;
      --line: rgba(232, 242, 234, 0.12);
      --accent: #3dff9a;
      --warn: #ffb454;
      --danger: #ff6b6b;
      --card: rgba(21, 32, 25, 0.72);
      --glow: rgba(61, 255, 154, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "DM Sans", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(900px 480px at 12% -10%, rgba(61, 255, 154, 0.16), transparent 55%),
        radial-gradient(700px 420px at 100% 0%, rgba(64, 180, 255, 0.1), transparent 50%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 55%, #0a100e);
      background-attachment: fixed;
    }

    .wrap {
      width: min(880px, calc(100% - 2rem));
      margin: 0 auto;
      /* 适配刘海/沉浸式状态栏：顶部至少预留 safe-area */
      padding: calc(3.5rem + env(safe-area-inset-top, 0px)) 0 4rem;
    }

    .brand {
      font-family: Syne, sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 2.75rem);
      letter-spacing: -0.04em;
      line-height: 1;
      margin: 0 0 0.6rem;
    }
    .brand span { color: var(--accent); }

    .lead {
      margin: 0 0 2rem;
      color: var(--muted);
      max-width: 42rem;
      line-height: 1.55;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 1.25rem;
      box-shadow: 0 0 0 1px rgba(61, 255, 154, 0.04), 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      resize: vertical;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      color: var(--ink);
      font: inherit;
      padding: 0.9rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: rgba(61, 255, 154, 0.55);
      box-shadow: 0 0 0 3px var(--glow);
    }
    textarea::placeholder { color: #5f7467; }

    .row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.9rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button, .btn {
      font-family: Syne, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 0;
      cursor: pointer;
      padding: 0.8rem 1.2rem;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s, border-color 0.15s;
      font-size: 0.95rem;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: #04140b;
      min-width: 8.5rem;
    }
    .btn-primary:hover:not(:disabled) { background: #6dffb2; }

    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .btn-ghost:hover:not(:disabled) { border-color: rgba(232, 242, 234, 0.35); }

    .btn-download {
      background: linear-gradient(135deg, var(--accent), #2bd4ff);
      color: #04140b;
    }

    .btn-sm {
      padding: 0.45rem 0.75rem;
      font-size: 0.8rem;
    }

    .status {
      margin-top: 0.9rem;
      min-height: 1.4rem;
      font-size: 0.92rem;
      color: var(--muted);
    }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }
    .status.warn { color: var(--warn); }

    .progress {
      display: none;
      margin-top: 0.75rem;
      height: 6px;
      background: rgba(0, 0, 0, 0.35);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .progress.show { display: block; }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #2bd4ff);
      transition: width 0.25s ease;
    }

    .result {
      display: none;
      margin-top: 1.25rem;
      border-top: 1px solid var(--line);
      padding-top: 1.1rem;
      animation: rise 0.35s ease both;
    }
    .result.show { display: block; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.9rem;
    }
    .toolbar-left {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
    }
    .summary {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .check {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      user-select: none;
    }
    .check input { accent-color: var(--accent); }

    .list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .item {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.22);
      padding: 0.85rem;
      display: grid;
      grid-template-columns: auto 72px 1fr;
      gap: 0.85rem;
      align-items: start;
    }
    @media (max-width: 620px) {
      .item { grid-template-columns: auto 1fr; }
      .item .cover { grid-column: 2; width: 64px; height: 64px; }
      .item .body { grid-column: 1 / -1; }
    }

    .item.failed { border-color: rgba(255, 107, 107, 0.35); }
    .item.ok { border-color: rgba(61, 255, 154, 0.22); }
    .item.pending { opacity: 0.75; }

    .item .pick {
      padding-top: 0.35rem;
    }
    .item .pick input { accent-color: var(--accent); width: 16px; height: 16px; }

    .cover {
      width: 72px;
      height: 72px;
      object-fit: cover;
      background: #0a100e;
      border: 1px solid var(--line);
    }

    .title {
      font-family: Syne, sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 0.2rem;
      letter-spacing: -0.02em;
    }
    .artist { margin: 0 0 0.45rem; color: var(--muted); font-size: 0.92rem; }
    .url-hint {
      margin: 0 0 0.5rem;
      color: #6f8377;
      font-size: 0.78rem;
      word-break: break-all;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.55rem;
    }
    .chip {
      font-size: 0.72rem;
      color: #b7d0bf;
      border: 1px solid var(--line);
      padding: 0.2rem 0.45rem;
      background: rgba(0, 0, 0, 0.2);
    }
    .chip.err { color: #ffb4b4; border-color: rgba(255, 107, 107, 0.35); }
    .chip.warn { color: var(--warn); border-color: rgba(255, 180, 84, 0.35); }

    .item audio {
      width: 100%;
      height: 36px;
      margin-top: 0.35rem;
    }

    .note {
      margin-top: 1.5rem;
      color: #6f8377;
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .mode-tabs {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 1rem;
    }
    .mode-tab {
      font-family: Syne, sans-serif;
      font-weight: 700;
      font-size: 0.88rem;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      padding: 0.5rem 0.95rem;
      cursor: pointer;
    }
    .mode-tab.active {
      color: var(--accent);
      border-color: rgba(61, 255, 154, 0.45);
      background: rgba(61, 255, 154, 0.1);
    }

    .mode-panel { display: none; }
    .mode-panel.active { display: block; }

    .search-row {
      display: flex;
      gap: 0.65rem;
      flex-wrap: wrap;
    }
    .search-row input[type="search"] {
      flex: 1;
      min-width: 200px;
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      color: var(--ink);
      font: inherit;
      padding: 0.9rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-row input[type="search"]:focus {
      border-color: rgba(61, 255, 154, 0.55);
      box-shadow: 0 0 0 3px var(--glow);
    }
    .search-row input[type="search"]::placeholder { color: #5f7467; }
  </style>
</head>
<body>
  <script src="./qishui-cardkey.js"></script>
  <script src="./mobile-net.js"></script>
  <script>
    (function () {
      var CK = window.QishuiCardKey;
      var embed = new URLSearchParams(location.search).get("embed") === "1";
      if (!CK || !CK.hasUserSession()) {
        location.replace("./qishui-auth.html");
        return;
      }
      // 管理员统一走带 Tab 的管理页；嵌入模式下不跳转避免循环
      if (CK.hasAdminSession() && !embed) {
        location.replace("./qishui-admin.html#download");
      }
    })();
  </script>
  <main class="wrap">
    <h1 class="brand">音乐<span>下载</span></h1>
    <p class="lead">支持汽水分享链接批量解析，或按歌名搜索（优先使用 GD 聚合的 JOOX 源，失败时回退酷我）后试听、单曲下载、打包 ZIP。</p>

    <section class="panel">
      <div class="mode-tabs" role="tablist" aria-label="下载方式">
        <button class="mode-tab active" type="button" data-mode="link" id="modeLink">链接解析</button>
        <button class="mode-tab" type="button" data-mode="search" id="modeSearch">歌名搜索</button>
      </div>

      <div class="mode-panel active" id="panelLink">
        <label for="input">分享链接 / 文案（可多条）</label>
        <textarea id="input" placeholder="每行一条，或粘贴多段分享文案，例如：&#10;《为你写诗(R&B版)(Cover吴克群)》@汽水音乐 https://qishui.douyin.com/s/iCH7xHny/&#10;https://qishui.douyin.com/s/另一条/"></textarea>
        <div class="row">
          <button class="btn-primary" id="parseBtn" type="button">批量解析</button>
          <button class="btn-ghost" id="fillDemoBtn" type="button">填入示例</button>
          <button class="btn-ghost" id="clearBtn" type="button">清空</button>
        </div>
      </div>

      <div class="mode-panel" id="panelSearch">
        <label for="searchInput">歌名 / 歌手</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="例如：晴天 周杰伦" maxlength="80" />
          <select id="searchSource" aria-label="搜索来源" title="搜索来源" style="min-width:8.5rem;">
            <option value="auto" selected>自动（GD·JOOX → 酷我）</option>
            <option value="gd-joox">GD·JOOX</option>
            <option value="kuwo">酷我</option>
          </select>
          <button class="btn-primary" id="searchBtn" type="button">搜索</button>
        </div>
        <p class="note" style="margin-top:0.75rem">歌名搜索会按所选来源抓取播放地址；仅供个人学习使用。</p>
      </div>

      <div class="status" id="status" aria-live="polite"></div>
      <div class="progress" id="progress"><i id="progressBar"></i></div>

      <div class="result" id="result">
        <div class="toolbar">
          <div class="toolbar-left">
            <label class="check"><input type="checkbox" id="selectAll" checked /> 全选可下载</label>
            <span class="summary" id="summary"></span>
          </div>
          <div class="row" style="margin-top:0">
            <button class="btn-download" id="batchDownloadBtn" type="button">打包下载 ZIP</button>
          </div>
        </div>
        <div class="list" id="list"></div>
      </div>
    </section>

    <p class="note">仅供个人学习与已获授权内容备份。批量下载会打包成一个 ZIP；单曲下载仍为单独音频文件。歌名搜索数据来源包含 GD音乐台（music.gdstudio.xyz）聚合结果；音频直链有时效，解析后请尽快下载。</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script>
    const DEMO = [
      "《为你写诗(R&B版)(Cover吴克群)》@汽水音乐 https://qishui.douyin.com/s/iCH7xHny/",
    ].join("\n");
    const API = "https://api.bugpk.com/api/qsmusic";
    const GD_API = "https://music-api.gdstudio.xyz/api.php";
    const GD_PRIMARY_SOURCE = "joox";
    const KUWO_SEARCH = "https://search.kuwo.cn/r.s";
    const KUWO_PLAY = "https://antiserver.kuwo.cn/anti.s";
    const CONCURRENCY = 2;
    const SEARCH_LIMIT = 20;
    const KUWO_PROMO_MAX_BYTES = 400 * 1024;
    const GD_MIN_BYTES = 512 * 1024;

    const input = document.getElementById("input");
    const searchInput = document.getElementById("searchInput");
    const searchSourceEl = document.getElementById("searchSource");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const listEl = document.getElementById("list");
    const parseBtn = document.getElementById("parseBtn");
    const searchBtn = document.getElementById("searchBtn");
    const batchDownloadBtn = document.getElementById("batchDownloadBtn");
    const selectAllEl = document.getElementById("selectAll");
    const summaryEl = document.getElementById("summary");
    const progressEl = document.getElementById("progress");
    const progressBar = document.getElementById("progressBar");
    const panelLink = document.getElementById("panelLink");
    const panelSearch = document.getElementById("panelSearch");

    /** @type {Array<{id:string, sourceUrl:string, status:string, error?:string, data?:any, selected:boolean}>} */
    let tracks = [];
    let busy = false;
    let currentMode = "link";
    let activeTask = "";
    let stopRequested = false;
    let taskRunSeq = 0;
    let activeRunId = 0;

    function setBusyUi(on) {
      busy = on;
      if (!on) {
        parseBtn.disabled = false;
        searchBtn.disabled = false;
        parseBtn.textContent = "批量解析";
        searchBtn.textContent = "搜索";
      } else if (activeTask === "parse") {
        parseBtn.disabled = false;
        parseBtn.textContent = "停止";
        searchBtn.disabled = true;
        searchBtn.textContent = "搜索";
      } else if (activeTask === "search") {
        searchBtn.disabled = false;
        searchBtn.textContent = "停止";
        parseBtn.disabled = true;
        parseBtn.textContent = "批量解析";
      } else {
        parseBtn.disabled = true;
        searchBtn.disabled = true;
      }
      batchDownloadBtn.disabled = on || tracks.filter((t) => t.status === "ok" && t.selected).length === 0;
    }

    function isRunActive(runId) {
      return runId !== 0 && runId === activeRunId;
    }

    function startTask(type) {
      activeTask = type;
      stopRequested = false;
      activeRunId = ++taskRunSeq;
      setBusyUi(true);
      return activeRunId;
    }

    function finishTask(runId = 0) {
      if (runId && runId !== activeRunId) return;
      activeTask = "";
      stopRequested = false;
      activeRunId = 0;
      setBusyUi(false);
    }

    function requestStop() {
      if (!busy) return;
      stopRequested = true;
      // 立即失效当前任务并解锁界面；晚到的网络结果将被忽略
      activeRunId = 0;
      activeTask = "";
      setBusyUi(false);
      setStatus("已请求停止，正在取消中…", "warn");
    }

    function switchMode(mode) {
      currentMode = mode;
      for (const btn of document.querySelectorAll(".mode-tab")) {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      }
      panelLink.classList.toggle("active", mode === "link");
      panelSearch.classList.toggle("active", mode === "search");
    }

    for (const btn of document.querySelectorAll(".mode-tab")) {
      btn.addEventListener("click", () => switchMode(btn.dataset.mode));
    }

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function setProgress(done, total) {
      if (!total) {
        progressEl.classList.remove("show");
        progressBar.style.width = "0%";
        return;
      }
      progressEl.classList.add("show");
      progressBar.style.width = `${Math.round((done / total) * 100)}%`;
    }

    function extractUrls(text) {
      const re = /https?:\/\/(?:qishui|music)\.douyin\.com\/[^\s<>"']+/gi;
      const found = String(text || "").match(re) || [];
      const cleaned = found.map((u) => u.replace(/[)\]】》'",.]+$/g, ""));
      return [...new Set(cleaned)];
    }

    function formatBytes(n) {
      if (!n && n !== 0) return "未知大小";
      const u = ["B", "KB", "MB", "GB"];
      let i = 0;
      let v = Number(n);
      while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
      return `${v.toFixed(i ? 2 : 0)} ${u[i]}`;
    }

    function safeName(name) {
      return String(name || "qishui-track")
        .replace(/[\\/:*?"<>|]+/g, "_")
        .replace(/\s+/g, " ")
        .trim()
        .slice(0, 80);
    }

    function filenameOf(data) {
      const ext = (data.video_meta?.vtype || "m4a").replace(/^\./, "");
      const artist = safeName(data.artistsname || data.artist || "未知艺人");
      const title = safeName(data.albumname || data.title || "未命名曲目");
      return `${artist} - ${title}.${ext}`;
    }

    function coverOf(data) {
      return (
        (Array.isArray(data.artistsmedium_avatar_url) && data.artistsmedium_avatar_url[0]) ||
        data.cover ||
        data.avatar ||
        ""
      );
    }

    function sourceLabel(source) {
      switch (source) {
        case "joox": return "JOOX";
        case "gd-joox": return "GD·JOOX";
        case "kuwo": return "酷我";
        case "gd-kuwo": return "GD·酷我";
        case "qishui": return "汽水";
        default: return source ? String(source).toUpperCase() : "";
      }
    }

    function updateSummary() {
      const ok = tracks.filter((t) => t.status === "ok").length;
      const fail = tracks.filter((t) => t.status === "error").length;
      const selected = tracks.filter((t) => t.status === "ok" && t.selected).length;
      summaryEl.textContent = `共 ${tracks.length} 条 · 成功 ${ok} · 失败 ${fail} · 已选 ${selected}`;
      batchDownloadBtn.disabled = busy || selected === 0;
      const selectable = tracks.filter((t) => t.status === "ok");
      selectAllEl.checked = selectable.length > 0 && selectable.every((t) => t.selected);
      selectAllEl.indeterminate = selectable.some((t) => t.selected) && !selectAllEl.checked;
    }

    function renderList() {
      listEl.innerHTML = "";
      for (const track of tracks) {
        const item = document.createElement("article");
        item.className = `item ${track.status}`;
        item.dataset.id = track.id;

        const pick = document.createElement("label");
        pick.className = "pick";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = !!track.selected;
        cb.disabled = track.status !== "ok" || busy;
        cb.addEventListener("change", () => {
          track.selected = cb.checked;
          updateSummary();
        });
        pick.appendChild(cb);

        const cover = document.createElement("img");
        cover.className = "cover";
        cover.alt = "封面";
        const coverUrl = track.data ? coverOf(track.data) : "";
        if (coverUrl) cover.src = coverUrl;
        else cover.style.visibility = "hidden";

        const body = document.createElement("div");
        body.className = "body";

        const title = document.createElement("h2");
        title.className = "title";
        title.textContent = track.data
          ? (track.data.albumname || track.data.title || "未命名曲目")
          : (track.status === "pending" ? "解析中…" : "解析失败");

        const artist = document.createElement("p");
        artist.className = "artist";
        artist.textContent = track.data
          ? (track.data.artistsname || track.data.artist || "未知艺人")
          : (track.error || "等待解析");

        const urlHint = document.createElement("p");
        urlHint.className = "url-hint";
        urlHint.textContent = track.sourceUrl;

        const chips = document.createElement("div");
        chips.className = "chips";
        if (track.status === "ok" && track.data) {
          const meta = track.data.video_meta || {};
          for (const t of [
            sourceLabel(track.data.source),
            meta.vtype || "audio",
            meta.codec_type,
            meta.bitrate ? `${Math.round(meta.bitrate / 1000)} kbps` : null,
            formatBytes(meta.size),
          ].filter(Boolean)) {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = t;
            chips.appendChild(chip);
          }
        } else if (track.status === "error") {
          const chip = document.createElement("span");
          chip.className = "chip err";
          chip.textContent = "失败";
          chips.appendChild(chip);
        } else {
          const chip = document.createElement("span");
          chip.className = "chip warn";
          chip.textContent = "解析中";
          chips.appendChild(chip);
        }
        if (track.hit?.vipOnly) {
          const chip = document.createElement("span");
          chip.className = "chip err";
          chip.textContent = "VIP";
          chips.appendChild(chip);
        } else if (track.hit) {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = "可播";
          chips.appendChild(chip);
        }

        const actions = document.createElement("div");
        actions.className = "row";
        actions.style.marginTop = "0.35rem";

        if (track.status === "ok" && track.data?.url) {
          const dl = document.createElement("button");
          dl.type = "button";
          dl.className = "btn-download btn-sm";
          dl.textContent = "下载";
          dl.disabled = busy;
          dl.addEventListener("click", () => downloadOne(track));
          actions.appendChild(dl);

          const open = document.createElement("button");
          open.type = "button";
          open.className = "btn-ghost btn-sm";
          open.textContent = "直链";
          open.addEventListener("click", () => {
            window.open(track.data.url, "_blank", "noopener,noreferrer");
          });
          actions.appendChild(open);

          const audio = document.createElement("audio");
          audio.controls = true;
          audio.preload = "none";
          attachAudio(audio, track.data.url);
          body.append(title, artist, urlHint, chips, actions, audio);
        } else {
          body.append(title, artist, urlHint, chips, actions);
        }

        item.append(pick, cover, body);
        listEl.appendChild(item);
      }

      resultEl.classList.toggle("show", tracks.length > 0);
      updateSummary();
    }

    function decodeHtml(text) {
      const el = document.createElement("textarea");
      el.innerHTML = String(text || "");
      return el.value;
    }

    function kuwoCover(item) {
      const short = item.web_albumpic_short || item.web_artistpic_short || "";
      if (!short) return "";
      if (/^https?:\/\//i.test(short)) return short;
      return `https://img2.kuwo.cn/star/albumcover/${short}`;
    }

    function toHttps(url) {
      return String(url || "").replace(/^http:\/\//i, "https://");
    }

    function toArray(value) {
      if (Array.isArray(value)) return value.filter(Boolean);
      if (value == null || value === "") return [];
      return [value];
    }

    function firstNonEmpty(...values) {
      for (const value of values) {
        if (value != null && String(value).trim()) return String(value).trim();
      }
      return "";
    }

    async function fetchGdJson(params) {
      const res = await MobileNet.netFetch(`${GD_API}?${params.toString()}`);
      if (!res.ok) throw new Error(`GD API HTTP ${res.status}`);
      return res.json();
    }

    async function searchGd(keyword, source = GD_PRIMARY_SOURCE) {
      const params = new URLSearchParams({
        types: "search",
        source,
        name: keyword,
        count: String(SEARCH_LIMIT),
        pages: "1",
      });
      const json = await fetchGdJson(params);
      const list = Array.isArray(json) ? json : [];
      return list.map((item) => {
        const artists = toArray(item.artist).map((x) => decodeHtml(x)).filter(Boolean);
        return {
          rid: String(item.id || ""),
          title: decodeHtml(item.name || "未命名曲目"),
          artist: artists.join(" / ") || "未知艺人",
          album: decodeHtml(item.album || ""),
          cover: "",
          sourceUrl: `${source}://${item.id}`,
          source,
          vipOnly: false,
          fromGd: true,
          raw: item,
        };
      }).filter((x) => x.rid);
    }

    async function fetchGdPlayUrl(hit) {
      const params = new URLSearchParams({
        types: "url",
        source: hit.source,
        id: hit.rid,
        br: "128",
      });
      const json = await fetchGdJson(params);
      const url = toHttps(json?.url || "");
      if (!/^https?:\/\//i.test(url)) {
        throw new Error(`${sourceLabel(`gd-${hit.source}`)} 未返回可用播放地址`);
      }
      // GD API 返回的 size 通常是“字节数”，不要额外乘 1024
      const size = Number(json?.size || 0);
      if (Number.isFinite(size) && size > 0 && size < GD_MIN_BYTES) {
        throw new Error(`${sourceLabel(`gd-${hit.source}`)} 返回的音频疑似不可用`);
      }
      return {
        url,
        size: Number.isFinite(size) && size > 0 ? size : undefined,
      };
    }

    function isKuwoVipHit(item) {
      const mvpay = item?.mvpayinfo || {};
      return String(mvpay.play || "0") === "1";
    }

    async function fetchKuwoPlayUrl(rid, hit) {
      if (hit?.vipOnly) {
        throw new Error("酷我VIP曲目，请选择标有「可播」的其他版本");
      }
      const res = await MobileNet.netFetch(
        `${KUWO_PLAY}?type=convert_url&format=mp3&response=url&rid=${encodeURIComponent(rid)}`
      );
      if (!res.ok) throw new Error(`播放地址 HTTP ${res.status}`);
      const text = (await res.text()).trim();
      if (!/^https?:\/\//i.test(text)) throw new Error("未返回可用播放地址");
      const url = toHttps(text);
      const len = await MobileNet.headLength(url);
      if (len != null && len < KUWO_PROMO_MAX_BYTES) {
        throw new Error("返回酷我试听提示音，请换其他可播版本");
      }
      return url;
    }

    async function searchKuwo(keyword) {
      const params = new URLSearchParams({
        all: keyword,
        ft: "music",
        client: "kt",
        rformat: "json",
        encoding: "utf8",
        pcmp4: "1",
        mobi: "1",
        vipver: "1",
        pn: "0",
        rn: String(SEARCH_LIMIT),
      });
      const res = await MobileNet.netFetch(`${KUWO_SEARCH}?${params.toString()}`);
      if (!res.ok) throw new Error(`搜索 HTTP ${res.status}`);
      const text = await res.text();
      let json;
      try {
        json = JSON.parse(text);
      } catch (_) {
        throw new Error("搜索结果解析失败");
      }
      const list = Array.isArray(json.abslist) ? json.abslist : [];
      const hits = list.map((item) => {
        const rid = String(item.MUSICRID || "").replace(/^MUSIC_/i, "");
        const title = decodeHtml(item.NAME || item.SONGNAME || "未命名曲目");
        const artist = decodeHtml(item.ARTIST || "未知艺人");
        const vipOnly = isKuwoVipHit(item);
        return {
          rid,
          title,
          artist,
          album: decodeHtml(item.ALBUM || ""),
          cover: kuwoCover(item),
          sourceUrl: `kuwo://${rid}`,
          vipOnly,
        };
      }).filter((x) => x.rid);

      hits.sort((a, b) => Number(a.vipOnly) - Number(b.vipOnly));
      return hits;
    }

    async function resolveKuwoTrack(hit) {
      const url = await fetchKuwoPlayUrl(hit.rid, hit);
      return {
        url,
        albumname: hit.title,
        artistsname: hit.artist,
        artistsmedium_avatar_url: hit.cover ? [hit.cover] : [],
        video_meta: {
          vtype: "mp3",
          codec_type: "mp3",
          bitrate: 128000,
        },
        source: "kuwo",
      };
    }

    async function resolveGdTrack(hit) {
      const media = await fetchGdPlayUrl(hit);
      return {
        url: media.url,
        albumname: hit.title,
        artistsname: hit.artist,
        artistsmedium_avatar_url: hit.cover ? [hit.cover] : [],
        video_meta: {
          vtype: "mp3",
          codec_type: "mp3",
          bitrate: 128000,
          size: media.size,
        },
        source: `gd-${hit.source}`,
      };
    }

    async function searchTracks(keyword, sourceMode = "auto") {
      if (sourceMode === "kuwo") return searchKuwo(keyword);

      if (sourceMode === "gd-joox") {
        return await searchGd(keyword, GD_PRIMARY_SOURCE).catch(() => []);
      }

      // auto：GD·JOOX 优先，失败/无结果则回退酷我
      const gdHits = await searchGd(keyword, GD_PRIMARY_SOURCE).catch(() => []);
      if (gdHits.length) return gdHits;
      return searchKuwo(keyword);
    }

    async function resolveTrack(hit) {
      if (hit?.fromGd) return resolveGdTrack(hit);
      return resolveKuwoTrack(hit);
    }

    function attachAudio(audio, url) {
      if (!url) return;
      if (MobileNet.supportsDirectStream() && MobileNet.needsReferer(url)) {
        audio.src = url;
        audio.preload = "metadata";
        return;
      }
      if (MobileNet.isNative() && MobileNet.needsReferer(url)) {
        audio.preload = "none";
        MobileNet.playableUrl(url).then((src) => {
          audio.src = src;
        }).catch((err) => {
          console.warn("playableUrl failed", err);
          audio.title = "试听加载失败，请尝试下载";
        });
        return;
      }
      audio.src = url;
    }

    async function parseOne(sourceUrl) {
      const res = await MobileNet.netFetch(`${API}?url=${encodeURIComponent(sourceUrl)}`);
      if (!res.ok) throw new Error(`接口 HTTP ${res.status}`);
      const json = await res.json();
      if (json.code !== 200 || !json.data?.url) {
        throw new Error(json.msg || "未返回音频地址");
      }
      return json.data;
    }

    async function mapPool(items, limit, worker, shouldStop) {
      const results = new Array(items.length);
      let next = 0;
      async function run() {
        while (next < items.length) {
          if (shouldStop && shouldStop()) return;
          const i = next++;
          results[i] = await worker(items[i], i);
          if (shouldStop && shouldStop()) return;
        }
      }
      await Promise.all(Array.from({ length: Math.min(limit, items.length) }, run));
      return results;
    }

    async function parseAll() {
      if (busy) {
        if (activeTask === "parse") requestStop();
        return;
      }
      const urls = extractUrls(input.value);
      if (!urls.length) {
        setStatus("未识别到汽水/抖音音乐链接。可多行粘贴 https://qishui.douyin.com/s/... 链接。", "error");
        tracks = [];
        renderList();
        setProgress(0, 0);
        return;
      }

      const runId = startTask("parse");
      tracks = urls.map((sourceUrl, i) => ({
        id: `t${i}-${Date.now()}`,
        sourceUrl,
        status: "pending",
        selected: false,
      }));
      renderList();
      setProgress(0, urls.length);
      setStatus(`识别到 ${urls.length} 条链接，开始解析…`);

      let done = 0;
      let ok = 0;
      let fail = 0;

      await mapPool(tracks, CONCURRENCY, async (track) => {
        if (!isRunActive(runId) || stopRequested) return;
        try {
          const data = await parseOne(track.sourceUrl);
          if (!isRunActive(runId) || stopRequested) return;
          track.data = data;
          track.status = "ok";
          track.selected = true;
          ok++;
        } catch (err) {
          if (!isRunActive(runId) || stopRequested) return;
          track.status = "error";
          track.error = err.message || String(err);
          track.selected = false;
          fail++;
        }
        if (!isRunActive(runId) || stopRequested) return;
        done++;
        setProgress(done, urls.length);
        setStatus(`解析中 ${done}/${urls.length} · 成功 ${ok} · 失败 ${fail}`);
        renderList();
      }, () => stopRequested || !isRunActive(runId));

      if (!isRunActive(runId)) return;

      const wasStopped = stopRequested;
      finishTask(runId);
      renderList();
      setProgress(wasStopped ? done : urls.length, urls.length);
      if (wasStopped) {
        setStatus(`已停止：已处理 ${done}/${urls.length} · 成功 ${ok} · 失败 ${fail}`, "warn");
        return;
      }
      const type = fail === 0 ? "ok" : ok === 0 ? "error" : "warn";
      setStatus(`解析完成：成功 ${ok}，失败 ${fail}。可勾选后批量下载。`, type);
    }

    async function searchAll() {
      if (busy) {
        if (activeTask === "search") requestStop();
        return;
      }
      const keyword = searchInput.value.trim();
      const sourceMode = searchSourceEl?.value || "auto";
      if (!keyword) {
        setStatus("请输入歌名或歌手", "error");
        searchInput.focus();
        return;
      }

      const runId = startTask("search");
      tracks = [];
      renderList();
      setProgress(0, 1);
      const modeLabel =
        sourceMode === "gd-joox"
          ? "GD·JOOX"
          : sourceMode === "kuwo"
            ? "酷我"
            : "自动（GD·JOOX → 酷我）";
      setStatus(`正在搜索「${keyword}」（${modeLabel}）…`);

      try {
        const hits = await searchTracks(keyword, sourceMode);
        if (!isRunActive(runId) || stopRequested) return;
        if (!hits.length) {
          finishTask(runId);
          setProgress(0, 0);
          setStatus("没有搜到相关歌曲，换个关键词试试。", "warn");
          return;
        }

        const primaryLabel = hits[0]?.fromGd ? `GD·${sourceLabel(hits[0].source)}` : "酷我";
        const playableCount = hits.filter((h) => !h.vipOnly).length;
        const vipCount = hits.length - playableCount;

        tracks = hits.map((hit, i) => ({
          id: `s${i}-${hit.rid}`,
          sourceUrl: `${hit.artist} - ${hit.title}`,
          status: "pending",
          selected: false,
          hit,
        }));
        renderList();
        setProgress(0, hits.length);
        setStatus(
          playableCount
            ? `${primaryLabel} 搜到 ${hits.length} 首（可播 ${playableCount}${vipCount ? `，VIP ${vipCount}` : ""}），正在获取播放地址…`
            : `搜到 ${hits.length} 首，但均受限。可换翻唱/现场版关键词再试。`
        );

        if (!playableCount) {
          for (const track of tracks) {
            track.status = "error";
            track.error = "当前结果受限，请换其他版本或关键词";
          }
          finishTask(runId);
          renderList();
          setProgress(hits.length, hits.length);
          setStatus("未找到可完整播放的版本，请尝试翻唱、现场版等关键词。", "warn");
          return;
        }

        let done = 0;
        let ok = 0;
        let fail = 0;
        let skipped = 0;

        await mapPool(tracks, CONCURRENCY, async (track) => {
          if (!isRunActive(runId) || stopRequested) return;
          if (track.hit?.vipOnly) {
            track.status = "error";
            track.error = "酷我VIP曲目，请选择标有「可播」的其他版本";
            track.selected = false;
            skipped++;
            done++;
            setProgress(done, hits.length);
            setStatus(`解析中 ${done}/${hits.length} · 成功 ${ok} · 失败 ${fail}${skipped ? ` · 跳过VIP ${skipped}` : ""}`);
            renderList();
            return;
          }
          try {
            const data = await resolveTrack(track.hit);
            if (!isRunActive(runId) || stopRequested) return;
            track.data = data;
            track.status = "ok";
            track.selected = true;
            ok++;
          } catch (err) {
            if (!isRunActive(runId) || stopRequested) return;
            track.status = "error";
            track.error = err.message || String(err);
            track.selected = false;
            fail++;
          }
          if (!isRunActive(runId) || stopRequested) return;
          done++;
          setProgress(done, hits.length);
          setStatus(`解析中 ${done}/${hits.length} · 成功 ${ok} · 失败 ${fail}${skipped ? ` · 跳过VIP ${skipped}` : ""}`);
          renderList();
        }, () => stopRequested || !isRunActive(runId));

        if (!isRunActive(runId)) return;

        const wasStopped = stopRequested;
        finishTask(runId);
        renderList();
        setProgress(wasStopped ? done : hits.length, hits.length);
        if (wasStopped) {
          setStatus(`已停止：已处理 ${done}/${hits.length} · 可播 ${ok} · 失败 ${fail}${skipped ? ` · 跳过VIP ${skipped}` : ""}`, "warn");
          return;
        }
        const type = fail === 0 && skipped === 0 ? "ok" : ok === 0 ? "error" : "warn";
        setStatus(
          `搜索完成：可播 ${ok}，失败 ${fail}${skipped ? `，VIP跳过 ${skipped}` : ""}。优先选择 ${primaryLabel} 的结果。`,
          type
        );
      } catch (err) {
        if (!isRunActive(runId)) return;
        finishTask(runId);
        setProgress(0, 0);
        setStatus(`搜索失败：${err.message || err}`, "error");
      }
    }

    function triggerSave(blob, filename) {
      const a = document.createElement("a");
      const obj = URL.createObjectURL(blob);
      a.href = obj;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(obj), 1500);
    }

    async function downloadBlob(url) {
      return MobileNet.downloadBlob(url);
    }

    async function downloadOne(track) {
      if (!track?.data?.url || busy) return;
      setBusyUi(true);
      renderList();
      setStatus(`正在下载：${filenameOf(track.data)}`);
      try {
        const blob = await downloadBlob(track.data.url);
        triggerSave(blob, filenameOf(track.data));
        setStatus(`已开始下载：${filenameOf(track.data)}`, "ok");
      } catch (err) {
        setStatus(`下载失败：${err.message || err}`, "error");
      } finally {
        setBusyUi(false);
        renderList();
      }
    }

    function uniqueZipName(baseName, used) {
      if (!used.has(baseName)) {
        used.add(baseName);
        return baseName;
      }
      const m = baseName.match(/^(.*?)(\.[^.]+)?$/);
      const stem = m?.[1] || baseName;
      const ext = m?.[2] || "";
      let i = 2;
      let next = `${stem} (${i})${ext}`;
      while (used.has(next)) {
        i++;
        next = `${stem} (${i})${ext}`;
      }
      used.add(next);
      return next;
    }

    function zipStamp() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}${p(d.getMonth() + 1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}`;
    }

    async function downloadSelected() {
      const selected = tracks.filter((t) => t.status === "ok" && t.selected && t.data?.url);
      if (!selected.length || busy) return;
      if (typeof JSZip === "undefined") {
        setStatus("JSZip 未加载，请检查网络后刷新页面。", "error");
        return;
      }

      setBusyUi(true);
      renderList();
      setProgress(0, selected.length + 1);

      const zip = new JSZip();
      const usedNames = new Set();
      let done = 0;
      let ok = 0;
      let fail = 0;

      for (const track of selected) {
        const name = uniqueZipName(filenameOf(track.data), usedNames);
        setStatus(`打包中 ${done + 1}/${selected.length}：${name}`);
        try {
          const blob = await downloadBlob(track.data.url);
          zip.file(name, blob);
          ok++;
        } catch (err) {
          fail++;
          console.warn("download failed", track.sourceUrl, err);
        }
        done++;
        setProgress(done, selected.length + 1);
      }

      if (ok === 0) {
        setBusyUi(false);
        renderList();
        setStatus("没有成功拉取到任何音频，未生成压缩包。", "error");
        return;
      }

      setStatus(`正在生成 ZIP（${ok} 首）…`);
      try {
        const zipBlob = await zip.generateAsync(
          { type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } },
          (meta) => {
            const packProgress = done + (meta.percent / 100);
            setProgress(packProgress, selected.length + 1);
          }
        );
        const zipName = `音乐_${ok}首_${zipStamp()}.zip`;
        triggerSave(zipBlob, zipName);
        setProgress(selected.length + 1, selected.length + 1);
        const type = fail === 0 ? "ok" : "warn";
        setStatus(`已下载压缩包：${zipName}${fail ? `（另有 ${fail} 首失败未打入）` : ""}`, type);
      } catch (err) {
        setStatus(`生成 ZIP 失败：${err.message || err}`, "error");
      } finally {
        setBusyUi(false);
        renderList();
      }
    }

    document.getElementById("fillDemoBtn").addEventListener("click", () => {
      input.value = DEMO;
      setStatus("已填入示例，可再粘贴更多链接后点「批量解析」。");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (busy) return;
      input.value = "";
      searchInput.value = "";
      tracks = [];
      renderList();
      setProgress(0, 0);
      setStatus("");
    });

    selectAllEl.addEventListener("change", () => {
      const on = selectAllEl.checked;
      for (const t of tracks) {
        if (t.status === "ok") t.selected = on;
      }
      renderList();
    });

    parseBtn.addEventListener("click", parseAll);
    searchBtn.addEventListener("click", searchAll);
    batchDownloadBtn.addEventListener("click", downloadSelected);
    input.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "Enter") parseAll();
    });
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        searchAll();
      }
    });

    const q = new URLSearchParams(location.search).get("url");
    if (q) {
      input.value = q;
      parseAll();
    }
  </script>
</body>
